<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>作业图片提交页</title>
    <meta name="description" content="用于展示与提交作业图片的个人页面" />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <header class="container header">
      <div class="brand">
        <div class="logo">HW</div>
        <div class="brand-text">
          <div class="brand-title">作业图片提交页</div>
          <div class="brand-subtitle">选择图片后自动预览（不上传到服务器）</div>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <h1 class="h1">上传/选择作业图片</h1>
        <p class="muted">
          请选择你的作业图片（支持多张）。选择后会在下方生成预览网格。你也可以拖拽图片到页面。
        </p>

        <div class="uploader" id="dropZone">
          <input
            id="fileInput"
            type="file"
            accept="image/*"
            multiple
          />
          <label class="upload-ui" for="fileInput">
            <div class="upload-title">点击选择图片</div>
            <div class="upload-desc">或将图片拖到此区域</div>
          </label>
        </div>

        <div class="row">
          <button class="btn ghost" id="clearBtn" type="button">清空预览</button>
          <div class="count muted" id="countText">已选择 0 张</div>
        </div>
      </section>

      <section class="panel">
        <h2 class="h2">图片预览</h2>
        <div class="grid" id="grid"></div>
        <p class="muted small" id="hint">
          提示：如果你要把图片“真正发布到网站上”，需要把图片文件一并上传到 GitHub 仓库（例如放到 <code>images/</code> 文件夹）。
        </p>
      </section>

      <footer class="footer muted">
        © <span id="year"></span> Yellow Jun
      </footer>
    </main>

    <script>
      const fileInput = document.getElementById("fileInput");
      const grid = document.getElementById("grid");
      const clearBtn = document.getElementById("clearBtn");
      const countText = document.getElementById("countText");
      const dropZone = document.getElementById("dropZone");
      document.getElementById("year").textContent = new Date().getFullYear();

      function setCount(n) {
        countText.textContent = `已选择 ${n} 张`;
      }

      function clearGrid() {
        grid.innerHTML = "";
        setCount(0);
      }

      function addFiles(files) {
        const list = Array.from(files || []).filter(f => f.type && f.type.startsWith("image/"));
        if (list.length === 0) return;

        list.forEach((file) => {
          const url = URL.createObjectURL(file);

          const card = document.createElement("div");
          card.className = "img-card";

          const img = document.createElement("img");
          img.src = url;
          img.alt = file.name;

          const meta = document.createElement("div");
          meta.className = "img-meta";
          meta.textContent = file.name;

          card.appendChild(img);
          card.appendChild(meta);
          grid.appendChild(card);
        });

        setCount(grid.querySelectorAll(".img-card").length);
      }

      fileInput.addEventListener("change", (e) => {
        addFiles(e.target.files);
        // 允许重复选择同一张图也能触发 change
        fileInput.value = "";
      });

      clearBtn.addEventListener("click", clearGrid);

      // Drag & Drop
      ["dragenter", "dragover"].forEach((evt) => {
        dropZone.addEventListener(evt, (e) => {
          e.preventDefault();
          e.stopPropagation();
          dropZone.classList.add("drag");
        });
      });

      ["dragleave", "drop"].forEach((evt) => {
        dropZone.addEventListener(evt, (e) => {
          e.preventDefault();
          e.stopPropagation();
          dropZone.classList.remove("drag");
        });
      });

      dropZone.addEventListener("drop", (e) => {
        addFiles(e.dataTransfer.files);
      });
    </script>
  </body>
</html>
